<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to TeamUp Sports - Access your account and join matches">
    <title>Login - TeamUp Sports</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="4" />
                    </svg>
                </div>
                <span>Team<span class="text-gradient">Up</span></span>
            </a>
        </div>
    </nav>

    <!-- Login Page -->
    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1 class="auth-title">Welcome Back</h1>
                    <p class="auth-subtitle">Sign in to continue to TeamUp Sports</p>
                </div>

                <form class="auth-form" id="loginForm" autocomplete="off">
                    <div class="form-group" id="loginIdentifierGroup">
                        <label class="form-label required">Email or Phone</label>
                        <input type="text" class="form-input" id="loginIdentifier"
                            placeholder="Enter email or phone number" required>
                        <span class="form-error" style="display: none;">Please enter a valid email or phone</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Password</label>
                        <div style="position: relative;">
                            <input type="password" class="form-input" id="loginPassword"
                                placeholder="Enter your password" data-validate="password" required>
                            <button type="button" class="btn btn-ghost btn-icon" id="toggleLoginPassword"
                                style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%);"
                                aria-label="Toggle password visibility">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" class="eye-icon">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <span class="form-error" style="display: none;">Password must be at least 6 characters</span>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="checkbox-group">
                            <input type="checkbox" class="checkbox-input" id="rememberMe">
                            <span class="checkbox-custom">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="3">
                                    <polyline points="20 6 9 17 4 12" />
                                </svg>
                            </span>
                            <span style="color: var(--text-secondary); font-size: 0.9rem;">Remember me</span>
                        </label>
                        <a href="forgot-password.html" style="color: var(--primary-500); font-size: 0.9rem;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Sign In
                    </button>
                </form>

                <div class="auth-divider">or continue with</div>

                <div style="display: flex; gap: var(--space-3);">
                    <button type="button" class="btn btn-secondary btn-google" style="flex: 1;" id="googleSignInBtn"
                        onclick="handleGoogleSignIn()">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4"
                                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                            <path fill="#34A853"
                                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                            <path fill="#FBBC05"
                                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                            <path fill="#EA4335"
                                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                        Sign in with Google
                    </button>
                </div>

                <p class="auth-footer">
                    Don't have an account? <a href="register.html">Sign up</a>
                </p>
            </div>
        </div>
    </main>



    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/env-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/google-auth.js"></script>
</body>

</html>
