<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Live Broadcast - TeamUp Sports</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="4" />
                    </svg>
                </div>
                <span>Team<span class="text-gradient">Up</span></span>
            </a>
            <div class="nav-actions"></div>
        </div>
    </nav>

    <main class="container" style="padding-top: 100px; padding-bottom: 60px;">
        <div style="max-width: 900px; margin: 0 auto;">
            <h1 style="margin-bottom: var(--space-6);">📡 Start Live Broadcast</h1>
            
            <div id="setupSection" class="card" style="margin-bottom: var(--space-6);">
                <h2>Select Match to Broadcast</h2>
                <div class="form-group">
                    <label class="form-label">Your Matches</label>
                    <select id="matchSelect" class="form-input">
                        <option value="">Loading matches...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Camera Label</label>
                    <input type="text" id="cameraLabel" class="form-input" placeholder="e.g., Main Camera, Goal View" value="Camera 1">
                </div>
                <button id="btnStartBroadcast" class="btn btn-primary btn-lg">Start Broadcasting</button>
            </div>

            <div id="broadcastSection" style="display: none;">
                <div class="card" style="margin-bottom: var(--space-4);">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-4);">
                        <div>
                            <h2 style="margin: 0;">🔴 Live</h2>
                            <p style="margin: 0; color: var(--text-secondary);">
                                <span id="viewerCount">0</span> viewers watching
                            </p>
                        </div>
                        <button id="btnStopBroadcast" class="btn btn-danger">Stop Broadcast</button>
                    </div>
                    <video id="localVideo" autoplay muted playsinline style="width: 100%; border-radius: 12px; background: #000;"></video>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/env-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/broadcast.js"></script>
</body>
</html>
