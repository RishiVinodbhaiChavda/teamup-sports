<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Live - TeamUp Sports</title>
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 255, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="4" />
                    </svg>
                </div>
                <span>Team<span class="text-gradient">Up</span></span>
            </a>
            <div class="nav-actions"></div>
        </div>
    </nav>

    <main class="container watch-live-page">
            <div class="page-header">
                <div class="page-header-content">
                    <div>
                        <h1 class="page-title">
                            <span class="live-indicator">
                                <span class="live-dot"></span>
                            </span>
                            Watch <span class="text-gradient">Live Action</span>
                        </h1>
                        <p class="page-subtitle">Experience the best matches nearby in real-time</p>
                    </div>
                    <div class="form-group filter-group">
                        <select id="cityFilter" class="form-input form-select">
                            <option value="">All Cities</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="streamsContainer"></div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/env-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/watch-live.js"></script>
</body>
</html>
