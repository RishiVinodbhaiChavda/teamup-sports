<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TeamUp Sports</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <circle cx="12" cy="12" r="4" />
                    </svg>
                </div>
                <span>Team<span class="text-gradient">Up</span></span>
            </a>
        </div>
    </nav>

    <!-- Forgot Password Page -->
    <main class="auth-page" style="padding-top: 100px;">
        <div class="auth-container" style="max-width: 480px;">
            <div class="auth-card">
                <div class="auth-header">
                    <div style="width: 64px; height: 64px; background: var(--primary-gradient); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4);">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </div>
                    <h1 class="auth-title">Forgot Password?</h1>
                    <p class="auth-subtitle">No worries! We'll send you reset instructions</p>
                </div>

                <!-- Step 1: Enter Email -->
                <form class="auth-form" id="forgotPasswordForm" style="display: block;">
                    <div class="form-group">
                        <label class="form-label required">Email Address</label>
                        <input type="email" class="form-input" id="resetEmail" placeholder="Enter your email" required>
                        <span class="form-error" style="display: none;">Please enter a valid email</span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" id="btnSendReset" style="width: 100%;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        Send Reset Code
                    </button>
                </form>

                <!-- Step 2: Enter OTP -->
                <div id="otpSection" style="display: none;">
                    <div class="form-group">
                        <label class="form-label required">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            Enter Verification Code
                        </label>
                        <div class="otp-container" id="resetOtpInputs">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="off">
                        </div>
                        <div style="margin-top: var(--space-4); display: flex; gap: var(--space-3);">
                            <button type="button" class="btn btn-primary" id="btnVerifyResetOtp" style="flex: 1;">
                                Verify Code
                            </button>
                            <button type="button" class="btn btn-ghost" id="btnResendResetOtp" disabled>
                                <span id="resetResendText">Resend (30s)</span>
                            </button>
                        </div>
                        <span class="form-error" style="display: none;" id="resetOtpError">Invalid or expired OTP</span>
                        <span class="form-hint" style="display: block; margin-top: 8px;">
                            ⏰ Code expires in 5 minutes. Check your email inbox and spam folder.
                        </span>
                    </div>
                </div>

                <!-- Step 3: Reset Password -->
                <form id="newPasswordForm" style="display: none;">
                    <div class="form-group">
                        <label class="form-label required">New Password</label>
                        <input type="password" class="form-input" id="newPassword" placeholder="Minimum 6 characters" required>
                        <span class="form-error" style="display: none;">Password must be at least 6 characters</span>
                    </div>

                    <div class="form-group">
                        <label class="form-label required">Confirm Password</label>
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Re-enter password" required>
                        <span class="form-error" style="display: none;">Passwords don't match</span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg" id="btnResetPassword" style="width: 100%;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                        Reset Password
                    </button>
                </form>

                <p class="auth-footer">
                    Remember your password? <a href="login.html">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="js/env-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/forgot-password.js"></script>
</body>

</html>
